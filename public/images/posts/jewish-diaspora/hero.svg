<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="50%" stop-color="#0a0f1f"/>
      <stop offset="100%" stop-color="#0c0a18"/>
    </linearGradient>
    <radialGradient id="glow-center" cx="0.5" cy="0.5">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-tl" cx="0.2" cy="0.3">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <ellipse cx="600" cy="300" rx="500" ry="350" fill="url(#glow-center)"/>
  <ellipse cx="250" cy="200" rx="300" ry="250" fill="url(#glow-tl)"/>

  <!-- Globe wireframe -->
  <g transform="translate(600, 300)" stroke="#a855f7" fill="none" opacity="0.15" stroke-width="0.8">
    <ellipse rx="220" ry="220"/>
    <ellipse rx="220" ry="220" transform="rotate(60)"/>
    <ellipse rx="220" ry="220" transform="rotate(120)"/>
    <ellipse rx="150" ry="220"/>
    <ellipse rx="70" ry="220"/>
    <line x1="-220" y1="0" x2="220" y2="0"/>
    <line x1="-200" y1="-90" x2="200" y2="-90"/>
    <line x1="-200" y1="90" x2="200" y2="90"/>
  </g>

  <!-- Simplified world continents outline -->
  <g transform="translate(600, 300)" fill="none" stroke="#06b6d4" stroke-width="1.2" opacity="0.3">
    <path d="M-160,-80 Q-150,-110 -130,-100 Q-120,-70 -140,-40 Q-155,-10 -140,20 Q-120,50 -130,80 Q-140,110 -120,130"/>
    <path d="M-10,-120 Q10,-100 0,-80 Q-10,-60 10,-40 Q20,-10 10,20 Q0,60 10,100 Q20,130 0,150"/>
    <path d="M30,-130 Q70,-120 100,-90 Q130,-60 120,-20 Q110,10 130,40 Q140,70 120,100"/>
    <path d="M130,60 Q150,50 170,60 Q180,80 160,90 Q140,85 130,60"/>
  </g>

  <!-- Connection lines (diaspora network) -->
  <g stroke="#a855f7" stroke-width="0.8" opacity="0.25">
    <line x1="480" y1="250" x2="350" y2="200" stroke-dasharray="4,4"/>
    <line x1="480" y1="250" x2="400" y2="320" stroke-dasharray="4,4"/>
    <line x1="480" y1="250" x2="700" y2="180" stroke-dasharray="4,4"/>
    <line x1="480" y1="250" x2="750" y2="280" stroke-dasharray="4,4"/>
    <line x1="480" y1="250" x2="600" y2="350" stroke-dasharray="4,4"/>
    <line x1="480" y1="250" x2="300" y2="300" stroke-dasharray="4,4"/>
    <line x1="480" y1="250" x2="850" y2="230" stroke-dasharray="4,4"/>
  </g>

  <!-- Diaspora nodes (cities) -->
  <g filter="url(#neon)">
    <circle cx="480" cy="250" r="8" fill="#06b6d4"/>
    <circle cx="480" cy="250" r="15" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.4"/>
    <circle cx="480" cy="250" r="25" fill="none" stroke="#06b6d4" stroke-width="0.5" opacity="0.2"/>
    <circle cx="350" cy="200" r="6" fill="#a855f7"/>
    <circle cx="350" cy="200" r="12" fill="none" stroke="#a855f7" stroke-width="0.5" opacity="0.3"/>
    <circle cx="300" cy="220" r="4" fill="#a855f7" opacity="0.7"/>
    <circle cx="400" cy="320" r="3.5" fill="#c084fc" opacity="0.6"/>
    <circle cx="520" cy="175" r="4" fill="#22d3ee" opacity="0.7"/>
    <circle cx="540" cy="200" r="4.5" fill="#06b6d4" opacity="0.8"/>
    <circle cx="700" cy="180" r="5" fill="#a855f7" opacity="0.7"/>
    <circle cx="750" cy="350" r="3" fill="#22d3ee" opacity="0.5"/>
    <circle cx="560" cy="370" r="3" fill="#c084fc" opacity="0.5"/>
    <circle cx="680" cy="270" r="2.5" fill="#06b6d4" opacity="0.4"/>
    <circle cx="330" cy="170" r="4" fill="#22d3ee" opacity="0.6"/>
  </g>

  <!-- Star of David -->
  <g transform="translate(480, 250) scale(0.4)" stroke="#06b6d4" fill="none" stroke-width="1.5" opacity="0.5" filter="url(#neon)">
    <polygon points="0,-30 26,15 -26,15"/>
    <polygon points="0,30 26,-15 -26,-15"/>
  </g>

  <!-- Particles -->
  <g fill="#06b6d4" opacity="0.3">
    <circle cx="100" cy="100" r="1.5"/><circle cx="150" cy="450" r="1"/>
    <circle cx="1050" cy="120" r="1.5"/><circle cx="1100" cy="400" r="1"/>
    <circle cx="900" cy="500" r="1.5"/><circle cx="200" cy="520" r="1"/>
  </g>
  <g fill="#a855f7" opacity="0.2">
    <circle cx="1000" cy="80" r="1"/><circle cx="80" cy="400" r="1.5"/>
    <circle cx="950" cy="480" r="1"/>
  </g>
</svg>
