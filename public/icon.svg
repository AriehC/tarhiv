<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="100%" stop-color="#0a0f1f"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="glow-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <circle cx="256" cy="230" r="140" fill="#06b6d4" opacity="0.07" filter="url(#soft)"/>
  <circle cx="280" cy="280" r="120" fill="#a855f7" opacity="0.06" filter="url(#soft)"/>

  <!-- Stylized ת letter -->
  <g filter="url(#neon)">
    <!-- Top horizontal bar -->
    <rect x="100" y="120" width="312" height="28" rx="14" fill="url(#grad)"/>
    <!-- Right vertical stroke -->
    <rect x="370" y="120" width="28" height="272" rx="14" fill="url(#grad)"/>
    <!-- Left vertical stroke (shorter) -->
    <rect x="150" y="120" width="28" height="180" rx="14" fill="url(#grad)"/>
    <!-- Bottom curve connecting left stroke -->
    <path d="M164,286 Q164,370 240,370" stroke="url(#grad)" stroke-width="28" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Decorative bottom line -->
  <rect x="80" y="430" width="352" height="2" rx="1" fill="url(#glow-line)" opacity="0.5"/>

  <!-- Subtle grid dots -->
  <g fill="#06b6d4" opacity="0.12">
    <circle cx="80" cy="80" r="2"/><circle cx="140" cy="80" r="2"/><circle cx="200" cy="80" r="2"/>
    <circle cx="312" cy="80" r="2"/><circle cx="372" cy="80" r="2"/><circle cx="432" cy="80" r="2"/>
    <circle cx="80" cy="460" r="2"/><circle cx="432" cy="460" r="2"/>
  </g>
</svg>
