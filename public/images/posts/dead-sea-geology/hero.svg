<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="40%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0c1a2e"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0e7490" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="salt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f9ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e0f2fe" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="cliff-l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="cliff-r" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow-water" cx="0.5" cy="0.6">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- Stars -->
  <g fill="white" opacity="0.4">
    <circle cx="100" cy="40" r="1"/><circle cx="250" cy="70" r="0.8"/>
    <circle cx="400" cy="30" r="1.2"/><circle cx="550" cy="55" r="0.7"/>
    <circle cx="700" cy="25" r="1"/><circle cx="850" cy="60" r="0.9"/>
    <circle cx="1000" cy="35" r="1.1"/><circle cx="1100" cy="50" r="0.8"/>
    <circle cx="150" cy="95" r="0.6"/><circle cx="950" cy="80" r="0.7"/>
  </g>

  <!-- Ambient glow -->
  <ellipse cx="600" cy="380" rx="500" ry="300" fill="url(#glow-water)"/>

  <!-- Desert cliffs - left -->
  <path d="M0,200 L0,600 L350,600 L350,350 Q340,280 300,250 Q260,220 220,240 Q180,200 140,220 Q100,180 50,200 Z" fill="url(#cliff-l)"/>
  <!-- cliff strata lines -->
  <g stroke="#06b6d4" stroke-width="0.5" opacity="0.1">
    <path d="M0,260 Q80,240 160,260 Q240,280 320,310" fill="none"/>
    <path d="M0,300 Q90,280 180,300 Q270,320 340,360" fill="none"/>
    <path d="M0,340 Q100,330 200,340 Q300,370 350,400" fill="none"/>
  </g>

  <!-- Desert cliffs - right -->
  <path d="M850,300 Q880,260 920,280 Q960,240 1000,260 Q1040,220 1080,240 Q1120,210 1200,220 L1200,600 L850,600 Z" fill="url(#cliff-r)"/>
  <g stroke="#a855f7" stroke-width="0.5" opacity="0.1">
    <path d="M870,340 Q950,310 1040,320 Q1120,300 1200,280" fill="none"/>
    <path d="M860,380 Q940,360 1030,370 Q1110,350 1200,340" fill="none"/>
  </g>

  <!-- Dead Sea water surface -->
  <path d="M350,350 Q500,330 600,340 Q700,330 850,350 L850,480 Q700,500 600,490 Q500,500 350,480 Z" fill="url(#water)"/>

  <!-- Water surface shimmer lines -->
  <g stroke="#06b6d4" stroke-width="0.8" opacity="0.2" filter="url(#neon)">
    <line x1="380" y1="365" x2="480" y2="360"/>
    <line x1="520" y1="355" x2="650" y2="350"/>
    <line x1="690" y1="358" x2="820" y2="365"/>
    <line x1="400" y1="390" x2="550" y2="385"/>
    <line x1="600" y1="380" x2="780" y2="388"/>
    <line x1="420" y1="415" x2="520" y2="410"/>
    <line x1="580" y1="408" x2="720" y2="415"/>
  </g>

  <!-- Salt crystals on shore -->
  <g fill="white" opacity="0.15">
    <polygon points="360,355 365,340 370,355"/>
    <polygon points="375,360 378,348 381,360"/>
    <polygon points="830,360 835,345 840,360"/>
    <polygon points="815,365 819,352 823,365"/>
  </g>

  <!-- Salt formations (pillars) -->
  <g fill="url(#salt)" stroke="#22d3ee" stroke-width="0.5" opacity="0.5">
    <rect x="580" y="420" width="15" height="50" rx="3"/>
    <rect x="605" y="430" width="12" height="40" rx="3"/>
    <rect x="625" y="425" width="14" height="45" rx="3"/>
  </g>

  <!-- Depth indicator line -->
  <g filter="url(#neon)">
    <line x1="600" y1="340" x2="600" y2="520" stroke="#06b6d4" stroke-width="1" stroke-dasharray="3,5" opacity="0.4"/>
    <text x="610" y="520" fill="#06b6d4" font-size="11" font-family="monospace" opacity="0.5">-430.5m</text>
  </g>

  <!-- Floating mineral particles -->
  <g fill="#22d3ee" opacity="0.3">
    <circle cx="450" cy="400" r="1.5"/><circle cx="500" cy="420" r="1"/>
    <circle cx="650" cy="390" r="1.5"/><circle cx="700" cy="430" r="1"/>
    <circle cx="550" cy="440" r="1.2"/><circle cx="750" cy="410" r="0.8"/>
  </g>
  <g fill="#a855f7" opacity="0.2">
    <circle cx="420" cy="430" r="1"/><circle cx="780" cy="400" r="1.2"/>
    <circle cx="600" cy="460" r="0.8"/>
  </g>
</svg>
