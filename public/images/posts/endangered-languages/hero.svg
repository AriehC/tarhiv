<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <radialGradient id="glow-cyan" cx="0.15" cy="0.45">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-purple" cx="0.72" cy="0.65">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.14"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="horizon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0"/>
      <stop offset="30%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#a855f7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="trunk-grad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="branch-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="#060b18"/>

  <!-- Ambient glow pools -->
  <ellipse cx="180" cy="270" rx="400" ry="320" fill="url(#glow-cyan)"/>
  <ellipse cx="860" cy="390" rx="350" ry="280" fill="url(#glow-purple)"/>

  <!-- Ground horizon line -->
  <line x1="0" y1="500" x2="1200" y2="500" stroke="url(#horizon)" stroke-width="1.5"/>
  <line x1="0" y1="501" x2="1200" y2="501" stroke="url(#horizon)" stroke-width="0.5" opacity="0.4"/>

  <!-- === THE TREE === -->
  <g filter="url(#glow)">
    <!-- Main trunk - thick at base, tapering up -->
    <path d="M920,500 Q918,460 915,420 Q912,380 908,340 Q905,310 900,280"
          fill="none" stroke="#a855f7" stroke-width="4.5" stroke-linecap="round" opacity="0.85"/>
    <!-- Trunk texture/slight curve -->
    <path d="M920,500 Q925,470 922,440 Q919,410 914,380"
          fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Primary branches (from trunk, spreading out) -->
  <g fill="none" stroke-linecap="round">
    <!-- Main branch going upper-right -->
    <path d="M900,280 Q910,250 930,220 Q945,200 970,180"
          stroke="#a855f7" stroke-width="3" opacity="0.75"/>
    <path d="M970,180 Q990,165 1010,155"
          stroke="#9343d9" stroke-width="2" opacity="0.65"/>
    <path d="M1010,155 Q1030,148 1050,145"
          stroke="#06b6d4" stroke-width="1.5" opacity="0.55"/>

    <!-- Branch going upper-left (main canopy) -->
    <path d="M905,300 Q885,270 860,245 Q840,225 815,210"
          stroke="#a855f7" stroke-width="3" opacity="0.7"/>
    <path d="M815,210 Q795,198 775,192"
          stroke="#9343d9" stroke-width="2" opacity="0.6"/>
    <path d="M775,192 Q758,188 740,190"
          stroke="#06b6d4" stroke-width="1.3" opacity="0.5"/>

    <!-- Branch going far right -->
    <path d="M912,350 Q940,330 965,315 Q985,305 1010,300"
          stroke="#a855f7" stroke-width="2.5" opacity="0.65"/>
    <path d="M1010,300 Q1035,296 1060,298"
          stroke="#9343d9" stroke-width="1.8" opacity="0.55"/>
    <path d="M1060,298 Q1080,300 1100,308"
          stroke="#06b6d4" stroke-width="1.2" opacity="0.45"/>

    <!-- Branch curving down-right -->
    <path d="M915,380 Q945,370 970,365 Q995,362 1020,365"
          stroke="#a855f7" stroke-width="2" opacity="0.6"/>
    <path d="M1020,365 Q1045,370 1065,380"
          stroke="#06b6d4" stroke-width="1.2" opacity="0.45"/>

    <!-- Small upper branch going left -->
    <path d="M900,280 Q880,260 855,255 Q835,252 810,258"
          stroke="#a855f7" stroke-width="2" opacity="0.6"/>
    <path d="M810,258 Q790,262 772,272"
          stroke="#06b6d4" stroke-width="1.2" opacity="0.45"/>

    <!-- Twig going up from main right branch -->
    <path d="M945,200 Q955,180 960,158 Q963,142 958,125"
          stroke="#9343d9" stroke-width="1.5" opacity="0.5"/>
    <path d="M958,125 Q954,110 945,100"
          stroke="#06b6d4" stroke-width="1" opacity="0.4"/>

    <!-- Twig going right from upper branch -->
    <path d="M1010,155 Q1025,140 1045,130"
          stroke="#06b6d4" stroke-width="1" opacity="0.4"/>

    <!-- Small twig going left from left branch -->
    <path d="M840,225 Q825,215 808,215 Q790,218 775,228"
          stroke="#9343d9" stroke-width="1.3" opacity="0.45"/>

    <!-- Twig from right-side branch -->
    <path d="M1060,298 Q1075,285 1090,275"
          stroke="#06b6d4" stroke-width="1" opacity="0.4"/>

    <!-- Small upper twig -->
    <path d="M930,220 Q920,200 905,185"
          stroke="#9343d9" stroke-width="1.3" opacity="0.5"/>
    <path d="M905,185 Q892,175 878,172"
          stroke="#06b6d4" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Root hints at the base -->
  <g fill="none" stroke="#a855f7" stroke-linecap="round" opacity="0.3">
    <path d="M920,500 Q935,505 955,510" stroke-width="2.5"/>
    <path d="M920,500 Q905,508 885,515" stroke-width="2"/>
    <path d="M920,500 Q940,510 970,520" stroke-width="1.5"/>
  </g>

  <!-- === ATTACHED LEAVES (on branches) === -->
  <!-- Leaf shape: pointed oval with center vein -->

  <!-- Leaves on upper-right branch -->
  <g fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.55">
    <ellipse cx="1050" cy="145" rx="8" ry="4" transform="rotate(-15,1050,145)"/>
    <line x1="1042" y1="145" x2="1058" y2="145" transform="rotate(-15,1050,145)" stroke-width="0.4"/>
  </g>
  <g fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.5">
    <ellipse cx="1045" cy="130" rx="7" ry="3.5" transform="rotate(10,1045,130)"/>
    <line x1="1038" y1="130" x2="1052" y2="130" transform="rotate(10,1045,130)" stroke-width="0.4"/>
  </g>
  <g fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.45">
    <ellipse cx="975" cy="175" rx="7" ry="3.5" transform="rotate(-25,975,175)"/>
    <line x1="968" y1="175" x2="982" y2="175" transform="rotate(-25,975,175)" stroke-width="0.4"/>
  </g>

  <!-- Leaves on upper-left branch -->
  <g fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.55">
    <ellipse cx="740" cy="190" rx="8" ry="4" transform="rotate(5,740,190)"/>
    <line x1="732" y1="190" x2="748" y2="190" transform="rotate(5,740,190)" stroke-width="0.4"/>
  </g>
  <g fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.5">
    <ellipse cx="775" cy="228" rx="7" ry="3.5" transform="rotate(-10,775,228)"/>
    <line x1="768" y1="228" x2="782" y2="228" transform="rotate(-10,775,228)" stroke-width="0.4"/>
  </g>
  <g fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.6">
    <ellipse cx="810" cy="215" rx="6" ry="3" transform="rotate(20,810,215)"/>
    <line x1="804" y1="215" x2="816" y2="215" transform="rotate(20,810,215)" stroke-width="0.4"/>
  </g>

  <!-- Leaves on right-side branch -->
  <g fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.5">
    <ellipse cx="1100" cy="308" rx="7" ry="3.5" transform="rotate(15,1100,308)"/>
    <line x1="1093" y1="308" x2="1107" y2="308" transform="rotate(15,1100,308)" stroke-width="0.4"/>
  </g>
  <g fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.45">
    <ellipse cx="1090" cy="275" rx="7" ry="3.5" transform="rotate(-20,1090,275)"/>
    <line x1="1083" y1="275" x2="1097" y2="275" transform="rotate(-20,1090,275)" stroke-width="0.4"/>
  </g>

  <!-- Leaves on lower-right branch -->
  <g fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.45">
    <ellipse cx="1065" cy="380" rx="7" ry="3.5" transform="rotate(20,1065,380)"/>
    <line x1="1058" y1="380" x2="1072" y2="380" transform="rotate(20,1065,380)" stroke-width="0.4"/>
  </g>

  <!-- Leaf on small twig -->
  <g fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.5">
    <ellipse cx="945" cy="100" rx="7" ry="3.5" transform="rotate(-35,945,100)"/>
    <line x1="938" y1="100" x2="952" y2="100" transform="rotate(-35,945,100)" stroke-width="0.4"/>
  </g>
  <g fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.55">
    <ellipse cx="878" cy="172" rx="7" ry="3.5" transform="rotate(5,878,172)"/>
    <line x1="871" y1="172" x2="885" y2="172" transform="rotate(5,878,172)" stroke-width="0.4"/>
  </g>

  <!-- Extra attached leaves -->
  <g fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.4">
    <ellipse cx="958" cy="158" rx="6" ry="3" transform="rotate(-40,958,158)"/>
    <line x1="952" y1="158" x2="964" y2="158" transform="rotate(-40,958,158)" stroke-width="0.4"/>
  </g>
  <g fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.5">
    <ellipse cx="1025" cy="155" rx="6" ry="3" transform="rotate(-5,1025,155)"/>
    <line x1="1019" y1="155" x2="1031" y2="155" transform="rotate(-5,1025,155)" stroke-width="0.4"/>
  </g>

  <!-- === FALLING LEAVES (drifting leftward, getting more transparent) === -->

  <!-- Falling leaf 1 - just detached, near tree, still quite visible -->
  <g fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.4">
    <ellipse cx="720" cy="200" rx="8" ry="4" transform="rotate(35,720,200)"/>
    <line x1="712" y1="200" x2="728" y2="200" transform="rotate(35,720,200)" stroke-width="0.4"/>
  </g>

  <!-- Falling leaf 2 -->
  <g fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.38">
    <ellipse cx="685" cy="240" rx="7" ry="3.5" transform="rotate(-20,685,240)"/>
    <line x1="678" y1="240" x2="692" y2="240" transform="rotate(-20,685,240)" stroke-width="0.4"/>
  </g>

  <!-- Falling leaf 3 -->
  <g fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.35">
    <ellipse cx="640" cy="185" rx="7.5" ry="3.8" transform="rotate(45,640,185)"/>
    <line x1="632.5" y1="185" x2="647.5" y2="185" transform="rotate(45,640,185)" stroke-width="0.4"/>
  </g>

  <!-- Falling leaf 4 -->
  <g fill="none" stroke="#06b6d4" stroke-width="0.7" opacity="0.3">
    <ellipse cx="580" cy="270" rx="7" ry="3.5" transform="rotate(15,580,270)"/>
    <line x1="573" y1="270" x2="587" y2="270" transform="rotate(15,580,270)" stroke-width="0.4"/>
  </g>

  <!-- Falling leaf 5 -->
  <g fill="none" stroke="#06b6d4" stroke-width="0.7" opacity="0.28">
    <ellipse cx="530" cy="220" rx="7" ry="3.5" transform="rotate(-30,530,220)"/>
    <line x1="523" y1="220" x2="537" y2="220" transform="rotate(-30,530,220)" stroke-width="0.35"/>
  </g>

  <!-- Falling leaf 6 - starting to fade more -->
  <g fill="none" stroke="#06b6d4" stroke-width="0.7" opacity="0.22">
    <ellipse cx="470" cy="300" rx="7" ry="3.5" transform="rotate(40,470,300)"/>
    <line x1="463" y1="300" x2="477" y2="300" transform="rotate(40,470,300)" stroke-width="0.35"/>
  </g>

  <!-- Falling leaf 7 -->
  <g fill="none" stroke="#06b6d4" stroke-width="0.6" opacity="0.2">
    <ellipse cx="420" cy="250" rx="7" ry="3.5" transform="rotate(-10,420,250)"/>
    <line x1="413" y1="250" x2="427" y2="250" transform="rotate(-10,420,250)" stroke-width="0.3"/>
  </g>

  <!-- Falling leaf 8 - getting faint -->
  <g fill="none" stroke="#06b6d4" stroke-width="0.6" opacity="0.15">
    <ellipse cx="365" cy="330" rx="7" ry="3.5" transform="rotate(25,365,330)"/>
    <line x1="358" y1="330" x2="372" y2="330" transform="rotate(25,365,330)" stroke-width="0.3"/>
  </g>

  <!-- Falling leaf 9 - starting to break apart -->
  <g fill="none" stroke="#06b6d4" stroke-width="0.5" opacity="0.12">
    <ellipse cx="310" cy="280" rx="6.5" ry="3.2" transform="rotate(-15,310,280)" stroke-dasharray="3,2"/>
    <line x1="303.5" y1="280" x2="316.5" y2="280" transform="rotate(-15,310,280)" stroke-width="0.3"/>
  </g>

  <!-- Falling leaf 10 - breaking apart, partial outline -->
  <g fill="none" stroke="#06b6d4" stroke-width="0.5" opacity="0.1">
    <path d="M252,350 Q258,346 264,350" stroke-dasharray="2,3"/>
    <path d="M264,350 Q258,354 252,350" stroke-dasharray="3,2" opacity="0.6"/>
  </g>

  <!-- Falling leaf 11 - mostly fragments -->
  <g fill="none" stroke="#06b6d4" stroke-width="0.5" opacity="0.08">
    <path d="M205,310 Q210,307 215,310" stroke-dasharray="2,4"/>
  </g>
  <g fill="#06b6d4">
    <circle cx="200" cy="312" r="1.2" opacity="0.1"/>
    <circle cx="208" cy="308" r="0.8" opacity="0.08"/>
    <circle cx="218" cy="313" r="1" opacity="0.07"/>
  </g>

  <!-- === DISSOLVING LEAVES (leftmost - just dots now) === -->

  <!-- Dissolved leaf cluster 1 -->
  <g fill="#06b6d4">
    <circle cx="155" cy="260" r="1.5" opacity="0.09"/>
    <circle cx="162" cy="256" r="1" opacity="0.07"/>
    <circle cx="148" cy="263" r="0.8" opacity="0.06"/>
    <circle cx="158" cy="252" r="1.2" opacity="0.05"/>
    <circle cx="165" cy="262" r="0.7" opacity="0.04"/>
  </g>

  <!-- Dissolved leaf cluster 2 -->
  <g fill="#a855f7">
    <circle cx="110" cy="340" r="1.3" opacity="0.08"/>
    <circle cx="118" cy="336" r="1" opacity="0.06"/>
    <circle cx="105" cy="344" r="0.9" opacity="0.05"/>
    <circle cx="115" cy="330" r="0.7" opacity="0.04"/>
  </g>

  <!-- Dissolved leaf cluster 3 -->
  <g fill="#06b6d4">
    <circle cx="80" cy="290" r="1.2" opacity="0.07"/>
    <circle cx="88" cy="286" r="0.9" opacity="0.05"/>
    <circle cx="74" cy="293" r="0.8" opacity="0.04"/>
    <circle cx="85" cy="282" r="1" opacity="0.03"/>
    <circle cx="92" cy="292" r="0.6" opacity="0.03"/>
  </g>

  <!-- Dissolved leaf cluster 4 -->
  <g fill="#a855f7">
    <circle cx="55" cy="370" r="1" opacity="0.06"/>
    <circle cx="62" cy="366" r="0.8" opacity="0.04"/>
    <circle cx="48" cy="374" r="0.7" opacity="0.03"/>
  </g>

  <!-- Dissolved leaf cluster 5 - barely visible -->
  <g fill="#06b6d4">
    <circle cx="130" cy="390" r="1" opacity="0.05"/>
    <circle cx="137" cy="386" r="0.7" opacity="0.04"/>
    <circle cx="124" cy="394" r="0.8" opacity="0.03"/>
    <circle cx="133" cy="382" r="0.6" opacity="0.02"/>
  </g>

  <!-- A couple more transitional leaves (between intact and dissolved) -->
  <!-- Half-dissolved near the middle -->
  <g fill="none" stroke="#a855f7" stroke-width="0.5" opacity="0.1">
    <path d="M175,355 Q180,351 185,355" stroke-dasharray="1,3"/>
  </g>
  <g fill="#a855f7">
    <circle cx="172" cy="358" r="1" opacity="0.08"/>
    <circle cx="188" cy="352" r="0.8" opacity="0.06"/>
  </g>

  <!-- Another transitional fragment -->
  <g fill="none" stroke="#06b6d4" stroke-width="0.4" opacity="0.08">
    <path d="M240,380 Q246,376 252,380"/>
  </g>
  <g fill="#06b6d4">
    <circle cx="238" cy="383" r="0.9" opacity="0.07"/>
    <circle cx="248" cy="377" r="0.7" opacity="0.05"/>
    <circle cx="254" cy="384" r="0.8" opacity="0.04"/>
  </g>

</svg>