<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="50%" stop-color="#0f0720"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <radialGradient id="glow-purple" cx="0.5" cy="0.5">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-cyan" cx="0.3" cy="0.3">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <ellipse cx="600" cy="300" rx="450" ry="350" fill="url(#glow-purple)"/>
  <ellipse cx="350" cy="200" rx="350" ry="250" fill="url(#glow-cyan)"/>

  <!-- Circuit board pattern -->
  <g stroke="#a855f7" stroke-width="0.6" fill="none" opacity="0.1">
    <!-- Horizontal lines -->
    <path d="M0,150 L300,150 L320,170 L500,170"/>
    <path d="M0,250 L200,250 L220,230 L400,230"/>
    <path d="M700,180 L900,180 L920,200 L1200,200"/>
    <path d="M800,350 L1000,350 L1020,330 L1200,330"/>
    <path d="M0,400 L250,400 L270,420 L500,420"/>
    <!-- Vertical lines -->
    <path d="M300,0 L300,150"/><path d="M500,170 L500,300"/>
    <path d="M900,0 L900,180"/><path d="M700,180 L700,350"/>
    <path d="M250,400 L250,600"/>
  </g>
  <!-- Circuit nodes -->
  <g fill="#a855f7" opacity="0.15">
    <circle cx="300" cy="150" r="3"/><circle cx="500" cy="170" r="3"/>
    <circle cx="200" cy="250" r="3"/><circle cx="400" cy="230" r="3"/>
    <circle cx="900" cy="180" r="3"/><circle cx="700" cy="350" r="3"/>
    <circle cx="250" cy="400" r="3"/>
  </g>

  <!-- Central network hub -->
  <g transform="translate(600, 280)">
    <!-- Outer rings -->
    <circle r="160" fill="none" stroke="#a855f7" stroke-width="0.5" opacity="0.12"/>
    <circle r="120" fill="none" stroke="#06b6d4" stroke-width="0.5" opacity="0.15"/>
    <circle r="80" fill="none" stroke="#a855f7" stroke-width="0.8" opacity="0.2"/>
    <circle r="40" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>

    <!-- Connection lines from center to nodes -->
    <g stroke="#06b6d4" stroke-width="0.8" opacity="0.2">
      <line x1="0" y1="0" x2="-130" y2="-80"/>
      <line x1="0" y1="0" x2="140" y2="-60"/>
      <line x1="0" y1="0" x2="-100" y2="100"/>
      <line x1="0" y1="0" x2="120" y2="90"/>
      <line x1="0" y1="0" x2="0" y2="-140"/>
      <line x1="0" y1="0" x2="-160" y2="20"/>
      <line x1="0" y1="0" x2="155" y2="30"/>
    </g>

    <!-- Network nodes -->
    <g filter="url(#neon)">
      <!-- Center (Israel) -->
      <circle r="10" fill="#a855f7"/>
      <circle r="16" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.4"/>

      <!-- Satellite nodes -->
      <circle cx="-130" cy="-80" r="5" fill="#06b6d4"/>
      <circle cx="140" cy="-60" r="6" fill="#22d3ee"/>
      <circle cx="-100" cy="100" r="4" fill="#c084fc"/>
      <circle cx="120" cy="90" r="5" fill="#06b6d4"/>
      <circle cx="0" cy="-140" r="4.5" fill="#a855f7"/>
      <circle cx="-160" cy="20" r="3.5" fill="#22d3ee"/>
      <circle cx="155" cy="30" r="4" fill="#c084fc"/>
    </g>
  </g>

  <!-- Floating tech icons (abstract) -->
  <!-- Code brackets -->
  <g transform="translate(200, 150)" stroke="#06b6d4" stroke-width="2" fill="none" opacity="0.4" filter="url(#neon)">
    <path d="M0,0 L-12,15 L0,30"/><path d="M25,0 L37,15 L25,30"/>
  </g>
  <!-- Chip -->
  <g transform="translate(950, 130)" stroke="#a855f7" stroke-width="1.5" fill="none" opacity="0.3" filter="url(#neon)">
    <rect x="0" y="0" width="24" height="24" rx="3"/>
    <line x1="-6" y1="8" x2="0" y2="8"/><line x1="-6" y1="16" x2="0" y2="16"/>
    <line x1="24" y1="8" x2="30" y2="8"/><line x1="24" y1="16" x2="30" y2="16"/>
    <line x1="8" y1="-6" x2="8" y2="0"/><line x1="16" y1="-6" x2="16" y2="0"/>
    <line x1="8" y1="24" x2="8" y2="30"/><line x1="16" y1="24" x2="16" y2="30"/>
  </g>
  <!-- Graph arrow -->
  <g transform="translate(150, 420)" stroke="#22d3ee" stroke-width="1.5" fill="none" opacity="0.35" filter="url(#neon)">
    <polyline points="0,30 10,20 20,25 30,10 40,5"/>
    <polygon points="40,5 35,2 37,8" fill="#22d3ee"/>
  </g>
  <!-- Binary -->
  <text x="1020" y="450" fill="#a855f7" opacity="0.12" font-family="monospace" font-size="10">01101001</text>
  <text x="1020" y="465" fill="#06b6d4" opacity="0.08" font-family="monospace" font-size="10">10010110</text>

  <!-- Rising bar chart (abstract) -->
  <g transform="translate(80, 350)" opacity="0.2">
    <rect x="0" y="60" width="12" height="40" rx="2" fill="#06b6d4"/>
    <rect x="18" y="40" width="12" height="60" rx="2" fill="#22d3ee"/>
    <rect x="36" y="20" width="12" height="80" rx="2" fill="#a855f7"/>
    <rect x="54" y="0" width="12" height="100" rx="2" fill="#c084fc"/>
  </g>

  <!-- Floating particles -->
  <g fill="#06b6d4" opacity="0.4">
    <circle cx="100" cy="80" r="1.5"/><circle cx="1100" cy="100" r="1"/>
    <circle cx="50" cy="500" r="1.2"/><circle cx="1150" cy="500" r="1.5"/>
  </g>
  <g fill="#a855f7" opacity="0.3">
    <circle cx="300" cy="500" r="1"/><circle cx="900" cy="80" r="1.2"/>
    <circle cx="1050" cy="350" r="1"/>
  </g>
</svg>
