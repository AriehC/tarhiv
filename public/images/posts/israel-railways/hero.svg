<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="50%" stop-color="#0c1222"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="rail-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="train-body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.3" cy="0.4">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.7" cy="0.6">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g stroke="#06b6d4" stroke-width="0.3" opacity="0.08">
    <line x1="0" y1="0" x2="0" y2="600"/><line x1="60" y1="0" x2="60" y2="600"/>
    <line x1="120" y1="0" x2="120" y2="600"/><line x1="180" y1="0" x2="180" y2="600"/>
    <line x1="240" y1="0" x2="240" y2="600"/><line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="360" y1="0" x2="360" y2="600"/><line x1="420" y1="0" x2="420" y2="600"/>
    <line x1="480" y1="0" x2="480" y2="600"/><line x1="540" y1="0" x2="540" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/><line x1="660" y1="0" x2="660" y2="600"/>
    <line x1="720" y1="0" x2="720" y2="600"/><line x1="780" y1="0" x2="780" y2="600"/>
    <line x1="840" y1="0" x2="840" y2="600"/><line x1="900" y1="0" x2="900" y2="600"/>
    <line x1="960" y1="0" x2="960" y2="600"/><line x1="1020" y1="0" x2="1020" y2="600"/>
    <line x1="1080" y1="0" x2="1080" y2="600"/><line x1="1140" y1="0" x2="1140" y2="600"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Ambient glows -->
  <ellipse cx="350" cy="250" rx="400" ry="300" fill="url(#glow1)"/>
  <ellipse cx="850" cy="350" rx="350" ry="250" fill="url(#glow2)"/>

  <!-- Perspective rails converging -->
  <line x1="0" y1="500" x2="1200" y2="340" stroke="#06b6d4" stroke-width="2" opacity="0.4" filter="url(#neon)"/>
  <line x1="0" y1="520" x2="1200" y2="360" stroke="#06b6d4" stroke-width="2" opacity="0.4" filter="url(#neon)"/>

  <!-- Glowing rail line -->
  <rect x="0" y="408" width="1200" height="2" fill="url(#rail-glow)" filter="url(#neon)"/>
  <rect x="0" y="422" width="1200" height="2" fill="url(#rail-glow)" filter="url(#neon)"/>

  <!-- Track ties -->
  <g fill="#06b6d4" opacity="0.15">
    <rect x="80" y="406" width="3" height="20" rx="1"/><rect x="130" y="406" width="3" height="20" rx="1"/>
    <rect x="180" y="406" width="3" height="20" rx="1"/><rect x="230" y="406" width="3" height="20" rx="1"/>
    <rect x="280" y="406" width="3" height="20" rx="1"/><rect x="330" y="406" width="3" height="20" rx="1"/>
    <rect x="380" y="406" width="3" height="20" rx="1"/><rect x="430" y="406" width="3" height="20" rx="1"/>
    <rect x="480" y="406" width="3" height="20" rx="1"/><rect x="530" y="406" width="3" height="20" rx="1"/>
    <rect x="580" y="406" width="3" height="20" rx="1"/><rect x="630" y="406" width="3" height="20" rx="1"/>
    <rect x="680" y="406" width="3" height="20" rx="1"/><rect x="730" y="406" width="3" height="20" rx="1"/>
    <rect x="780" y="406" width="3" height="20" rx="1"/><rect x="830" y="406" width="3" height="20" rx="1"/>
    <rect x="880" y="406" width="3" height="20" rx="1"/><rect x="930" y="406" width="3" height="20" rx="1"/>
    <rect x="980" y="406" width="3" height="20" rx="1"/><rect x="1030" y="406" width="3" height="20" rx="1"/>
    <rect x="1080" y="406" width="3" height="20" rx="1"/><rect x="1130" y="406" width="3" height="20" rx="1"/>
  </g>

  <!-- Modern train - sleek design -->
  <g transform="translate(280, 330)">
    <!-- Train glow underneath -->
    <ellipse cx="120" cy="85" rx="140" ry="20" fill="#06b6d4" opacity="0.15" filter="url(#soft-glow)"/>
    <!-- Main body -->
    <path d="M0,25 Q0,10 15,10 L240,10 Q260,10 270,20 L280,35 Q285,45 280,55 L280,72 Q280,80 270,80 L10,80 Q0,80 0,70 Z" fill="url(#train-body)"/>
    <!-- Windshield -->
    <path d="M240,18 L270,30 Q275,35 272,45 L258,45 Q250,45 250,38 L250,25 Q250,18 240,18 Z" fill="#22d3ee" opacity="0.6"/>
    <!-- Windows -->
    <rect x="20" y="25" width="30" height="22" rx="5" fill="#22d3ee" opacity="0.35"/>
    <rect x="60" y="25" width="30" height="22" rx="5" fill="#22d3ee" opacity="0.35"/>
    <rect x="100" y="25" width="30" height="22" rx="5" fill="#22d3ee" opacity="0.35"/>
    <rect x="140" y="25" width="30" height="22" rx="5" fill="#22d3ee" opacity="0.35"/>
    <rect x="180" y="25" width="30" height="22" rx="5" fill="#22d3ee" opacity="0.35"/>
    <!-- Accent stripe -->
    <rect x="0" y="55" width="280" height="3" rx="1.5" fill="#a855f7" opacity="0.7"/>
    <!-- Headlight -->
    <circle cx="277" cy="38" r="5" fill="#22d3ee" filter="url(#neon)"/>
    <!-- Wheels -->
    <circle cx="50" cy="82" r="10" fill="#1e293b" stroke="#06b6d4" stroke-width="1" opacity="0.6"/>
    <circle cx="130" cy="82" r="10" fill="#1e293b" stroke="#06b6d4" stroke-width="1" opacity="0.6"/>
    <circle cx="230" cy="82" r="10" fill="#1e293b" stroke="#06b6d4" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Speed particles -->
  <g fill="#06b6d4" opacity="0.5">
    <rect x="580" y="355" width="40" height="1.5" rx="0.75"/>
    <rect x="600" y="365" width="60" height="1.5" rx="0.75"/>
    <rect x="570" y="375" width="35" height="1.5" rx="0.75"/>
    <rect x="610" y="385" width="50" height="1.5" rx="0.75"/>
    <rect x="590" y="395" width="45" height="1.5" rx="0.75"/>
  </g>

  <!-- Cityscape silhouette -->
  <g fill="#0f172a" opacity="0.8">
    <rect x="650" y="250" width="40" height="160" rx="2"/>
    <rect x="700" y="200" width="30" height="210" rx="2"/>
    <rect x="740" y="270" width="50" height="140" rx="2"/>
    <rect x="800" y="220" width="35" height="190" rx="2"/>
    <rect x="845" y="280" width="45" height="130" rx="2"/>
    <rect x="900" y="240" width="30" height="170" rx="2"/>
    <rect x="940" y="300" width="40" height="110" rx="2"/>
  </g>
  <!-- Building window lights -->
  <g fill="#06b6d4" opacity="0.3">
    <rect x="660" y="265" width="8" height="6" rx="1"/><rect x="675" y="265" width="8" height="6" rx="1"/>
    <rect x="660" y="285" width="8" height="6" rx="1"/><rect x="675" y="305" width="8" height="6" rx="1"/>
    <rect x="710" y="215" width="8" height="6" rx="1"/><rect x="710" y="240" width="8" height="6" rx="1"/>
    <rect x="710" y="265" width="8" height="6" rx="1"/><rect x="810" y="240" width="8" height="6" rx="1"/>
    <rect x="810" y="265" width="8" height="6" rx="1"/><rect x="810" y="290" width="8" height="6" rx="1"/>
  </g>
  <g fill="#a855f7" opacity="0.2">
    <rect x="660" y="325" width="8" height="6" rx="1"/><rect x="750" y="285" width="8" height="6" rx="1"/>
    <rect x="750" y="310" width="8" height="6" rx="1"/><rect x="855" y="295" width="8" height="6" rx="1"/>
    <rect x="910" y="260" width="8" height="6" rx="1"/><rect x="910" y="285" width="8" height="6" rx="1"/>
  </g>

  <!-- Floating data points -->
  <circle cx="150" cy="150" r="3" fill="#06b6d4" opacity="0.6"/>
  <circle cx="200" cy="200" r="2" fill="#a855f7" opacity="0.4"/>
  <circle cx="1000" cy="130" r="2.5" fill="#06b6d4" opacity="0.5"/>
  <circle cx="1050" cy="180" r="2" fill="#a855f7" opacity="0.3"/>
  <circle cx="100" cy="300" r="2" fill="#22d3ee" opacity="0.4"/>
</svg>
