<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg-78" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="50%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#081020"/>
    </linearGradient>
    <radialGradient id="glow-israel" cx="0.5" cy="0.5">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-gold" cx="0.3" cy="0.7">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="star-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="neon-78">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="url(#bg-78)"/>
  <ellipse cx="600" cy="300" rx="600" ry="400" fill="url(#glow-israel)"/>
  <ellipse cx="300" cy="450" rx="350" ry="250" fill="url(#glow-gold)"/>

  <!-- Flag stripe top -->
  <rect x="0" y="80" width="1200" height="3" fill="#3b82f6" opacity="0.35"/>
  <rect x="0" y="517" width="1200" height="3" fill="#3b82f6" opacity="0.35"/>

  <!-- Large "78" numerals -->
  <g transform="translate(600, 300)" filter="url(#neon-78)">
    <text x="0" y="70" font-family="Georgia, serif" font-size="360" font-weight="700" fill="url(#star-grad)" text-anchor="middle" opacity="0.92">78</text>
    <text x="0" y="70" font-family="Georgia, serif" font-size="360" font-weight="700" fill="none" stroke="#60a5fa" stroke-width="0.8" text-anchor="middle" opacity="0.4">78</text>
  </g>

  <!-- Star of David (top left, decorative) -->
  <g transform="translate(180, 150)" opacity="0.35" filter="url(#neon-78)">
    <polygon points="0,-55 48,28 -48,28" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
    <polygon points="0,55 48,-28 -48,-28" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  </g>

  <!-- Star of David (bottom right, decorative) -->
  <g transform="translate(1020, 450)" opacity="0.3" filter="url(#neon-78)">
    <polygon points="0,-42 36,21 -36,21" fill="none" stroke="#93c5fd" stroke-width="1.2"/>
    <polygon points="0,42 36,-21 -36,-21" fill="none" stroke="#93c5fd" stroke-width="1.2"/>
  </g>

  <!-- Small Stars of David scattered -->
  <g opacity="0.18" filter="url(#neon-78)">
    <g transform="translate(100, 400)">
      <polygon points="0,-14 12,7 -12,7" fill="none" stroke="#60a5fa" stroke-width="0.8"/>
      <polygon points="0,14 12,-7 -12,-7" fill="none" stroke="#60a5fa" stroke-width="0.8"/>
    </g>
    <g transform="translate(1100, 130)">
      <polygon points="0,-10 9,5 -9,5" fill="none" stroke="#60a5fa" stroke-width="0.8"/>
      <polygon points="0,10 9,-5 -9,-5" fill="none" stroke="#60a5fa" stroke-width="0.8"/>
    </g>
    <g transform="translate(280, 520)">
      <polygon points="0,-10 9,5 -9,5" fill="none" stroke="#93c5fd" stroke-width="0.7"/>
      <polygon points="0,10 9,-5 -9,-5" fill="none" stroke="#93c5fd" stroke-width="0.7"/>
    </g>
    <g transform="translate(900, 90)">
      <polygon points="0,-8 7,4 -7,4" fill="none" stroke="#93c5fd" stroke-width="0.6"/>
      <polygon points="0,8 7,-4 -7,-4" fill="none" stroke="#93c5fd" stroke-width="0.6"/>
    </g>
  </g>

  <!-- Timeline arc: 1948 → 2026 -->
  <g opacity="0.28" filter="url(#neon-78)" fill="none">
    <path d="M150,500 Q600,420 1050,500" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,5"/>
    <circle cx="150" cy="500" r="5" fill="#fbbf24"/>
    <circle cx="1050" cy="500" r="5" fill="#60a5fa"/>
  </g>

  <!-- Year labels on timeline -->
  <g font-family="sans-serif" font-size="14" fill="#cbd5e1" opacity="0.65">
    <text x="150" y="540" text-anchor="middle">1948</text>
    <text x="1050" y="540" text-anchor="middle">2026</text>
  </g>

  <!-- Menorah silhouette (far left, symbolic) -->
  <g transform="translate(90, 280)" opacity="0.12" filter="url(#neon-78)">
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#60a5fa" stroke-width="1.2"/>
    <line x1="-40" y1="0" x2="-40" y2="-30" stroke="#60a5fa" stroke-width="1.2"/>
    <line x1="-20" y1="0" x2="-20" y2="-30" stroke="#60a5fa" stroke-width="1.2"/>
    <line x1="0" y1="0" x2="0" y2="-38" stroke="#60a5fa" stroke-width="1.2"/>
    <line x1="20" y1="0" x2="20" y2="-30" stroke="#60a5fa" stroke-width="1.2"/>
    <line x1="40" y1="0" x2="40" y2="-30" stroke="#60a5fa" stroke-width="1.2"/>
    <line x1="0" y1="0" x2="0" y2="22" stroke="#60a5fa" stroke-width="1.2"/>
    <rect x="-12" y="22" width="24" height="4" fill="#60a5fa"/>
  </g>

  <!-- Data grid -->
  <g stroke="#3b82f6" stroke-width="0.3" opacity="0.05">
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="800" y1="0" x2="800" y2="600"/>
    <line x1="1000" y1="0" x2="1000" y2="600"/>
  </g>

  <!-- Floating particles -->
  <g fill="#60a5fa" opacity="0.5">
    <circle cx="130" cy="100" r="1.5"/>
    <circle cx="1080" cy="520" r="1.2"/>
    <circle cx="80" cy="460" r="1.2"/>
    <circle cx="850" cy="60" r="1"/>
    <circle cx="550" cy="550" r="0.9"/>
    <circle cx="1150" cy="300" r="1"/>
  </g>
  <g fill="#fbbf24" opacity="0.4">
    <circle cx="250" cy="200" r="1"/>
    <circle cx="950" cy="470" r="1"/>
    <circle cx="400" cy="90" r="0.9"/>
  </g>

  <!-- Subtle title glyph: "עצמאות" hint (text for SEO via semantic presence) -->
  <text x="600" y="160" font-family="sans-serif" font-size="22" fill="#60a5fa" opacity="0.55" text-anchor="middle" letter-spacing="8">ישראל 2026</text>
  <text x="600" y="530" font-family="sans-serif" font-size="16" fill="#93c5fd" opacity="0.45" text-anchor="middle" letter-spacing="4">יום העצמאות</text>
</svg>
