<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="40%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a0818"/>
    </linearGradient>
    <radialGradient id="glow-center" cx="0.5" cy="0.45">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#a855f7" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-left" cx="0.15" cy="0.5">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-right" cx="0.85" cy="0.4">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- Ambient glow pools -->
  <ellipse cx="600" cy="270" rx="500" ry="350" fill="url(#glow-center)"/>
  <ellipse cx="180" cy="300" rx="350" ry="300" fill="url(#glow-left)"/>
  <ellipse cx="1020" cy="240" rx="300" ry="280" fill="url(#glow-right)"/>

  <!-- Globe wireframe (fragmented, dashed) -->
  <g transform="translate(600, 280)" stroke="#a855f7" fill="none" opacity="0.1" stroke-width="0.7">
    <ellipse rx="240" ry="240"/>
    <ellipse rx="240" ry="240" transform="rotate(60)"/>
    <ellipse rx="240" ry="240" transform="rotate(120)"/>
    <ellipse rx="160" ry="240"/>
    <ellipse rx="80" ry="240"/>
    <line x1="-240" y1="0" x2="240" y2="0"/>
    <line x1="-220" y1="-100" x2="220" y2="-100"/>
    <line x1="-220" y1="100" x2="220" y2="100"/>
  </g>

  <!-- Fragmented border lines (dashed, scattered across the globe) -->
  <!-- These represent broken, uncertain borders -->
  <g stroke="#06b6d4" fill="none" stroke-width="1" opacity="0.2" stroke-dasharray="6,8">
    <!-- Northern region fragments -->
    <path d="M380,150 Q420,130 460,140 Q490,148 510,135"/>
    <path d="M530,140 Q560,155 590,145 Q620,132 650,145"/>
    <path d="M670,138 Q710,125 750,140 Q780,150 810,135"/>
    <!-- Middle region fragments -->
    <path d="M340,250 Q370,235 400,245 Q420,255 440,240"/>
    <path d="M680,240 Q720,225 760,238 Q790,248 820,235"/>
    <!-- Southern region fragments -->
    <path d="M420,360 Q460,345 500,355 Q530,365 560,350"/>
    <path d="M600,355 Q640,340 680,352 Q710,362 740,348"/>
  </g>

  <!-- More fragmented borders (purple, different dash pattern) -->
  <g stroke="#a855f7" fill="none" stroke-width="0.8" opacity="0.15" stroke-dasharray="3,10">
    <path d="M300,190 Q340,175 380,188 Q410,200 440,185"/>
    <path d="M740,190 Q780,175 820,188 Q850,200 880,185"/>
    <path d="M350,310 Q390,295 430,308 Q460,318 490,303"/>
    <path d="M660,310 Q700,295 740,308 Q770,318 800,303"/>
    <path d="M480,410 Q520,395 560,408 Q590,418 620,403"/>
  </g>

  <!-- Dotted border remnants (very subtle) -->
  <g stroke="#06b6d4" fill="none" stroke-width="0.6" opacity="0.12" stroke-dasharray="1,6">
    <path d="M420,200 Q480,180 540,195"/>
    <path d="M580,200 Q640,180 700,195"/>
    <path d="M360,280 Q420,260 480,275"/>
    <path d="M620,275 Q680,258 740,272"/>
    <path d="M500,380 Q560,362 620,378"/>
  </g>

  <!-- Abstract territory shapes (hollow, fragmented outlines) -->
  <!-- Territory 1 - upper left -->
  <path d="M280,160 Q310,140 350,148 Q380,155 400,145 Q420,155 410,175 Q395,190 370,188 Q340,182 310,190 Q285,180 280,160"
        fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.18" stroke-dasharray="8,5"/>
  <!-- Territory 2 - upper right -->
  <path d="M750,155 Q790,140 830,150 Q860,160 870,180 Q860,200 835,205 Q800,200 775,208 Q750,195 745,175 Q748,165 750,155"
        fill="none" stroke="#a855f7" stroke-width="1" opacity="0.15" stroke-dasharray="6,7"/>
  <!-- Territory 3 - center -->
  <path d="M530,260 Q570,240 610,248 Q650,255 670,272 Q665,295 640,305 Q600,310 565,302 Q540,290 530,260"
        fill="#a855f7" fill-opacity="0.03" stroke="#a855f7" stroke-width="0.8" opacity="0.2" stroke-dasharray="4,6"/>
  <!-- Territory 4 - lower -->
  <path d="M440,350 Q480,335 520,342 Q555,350 570,368 Q560,388 530,395 Q490,398 460,388 Q440,375 440,350"
        fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.15" stroke-dasharray="5,8"/>

  <!-- Abstract people silhouettes - groups scattered outside territories -->
  <!-- Group 1 (left side, outside borders) -->
  <g filter="url(#neon)" opacity="0.6">
    <!-- Person 1 -->
    <circle cx="170" cy="240" r="5" fill="#06b6d4" opacity="0.7"/>
    <line x1="170" y1="245" x2="170" y2="268" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <!-- Person 2 -->
    <circle cx="185" cy="238" r="4.5" fill="#06b6d4" opacity="0.6"/>
    <line x1="185" y1="243" x2="185" y2="264" stroke="#06b6d4" stroke-width="1.3" stroke-linecap="round" opacity="0.5"/>
    <!-- Person 3 -->
    <circle cx="158" cy="244" r="4" fill="#06b6d4" opacity="0.5"/>
    <line x1="158" y1="248" x2="158" y2="266" stroke="#06b6d4" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <!-- Person 4 -->
    <circle cx="198" cy="242" r="3.5" fill="#06b6d4" opacity="0.45"/>
    <line x1="198" y1="246" x2="198" y2="262" stroke="#06b6d4" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
  </g>

  <!-- Group 2 (right side, between borders) -->
  <g filter="url(#neon)" opacity="0.55">
    <circle cx="920" cy="260" r="5" fill="#a855f7" opacity="0.65"/>
    <line x1="920" y1="265" x2="920" y2="288" stroke="#a855f7" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
    <circle cx="935" cy="258" r="4.5" fill="#a855f7" opacity="0.55"/>
    <line x1="935" y1="263" x2="935" y2="284" stroke="#a855f7" stroke-width="1.3" stroke-linecap="round" opacity="0.45"/>
    <circle cx="907" cy="263" r="4" fill="#a855f7" opacity="0.5"/>
    <line x1="907" y1="267" x2="907" y2="285" stroke="#a855f7" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <circle cx="948" cy="262" r="3.5" fill="#a855f7" opacity="0.4"/>
    <line x1="948" y1="266" x2="948" y2="280" stroke="#a855f7" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Group 3 (bottom center, displaced) -->
  <g filter="url(#neon)" opacity="0.5">
    <circle cx="560" cy="440" r="4.5" fill="#06b6d4" opacity="0.6"/>
    <line x1="560" y1="445" x2="560" y2="466" stroke="#06b6d4" stroke-width="1.3" stroke-linecap="round" opacity="0.5"/>
    <circle cx="575" cy="438" r="4" fill="#06b6d4" opacity="0.5"/>
    <line x1="575" y1="442" x2="575" y2="460" stroke="#06b6d4" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <circle cx="548" cy="442" r="3.5" fill="#06b6d4" opacity="0.45"/>
    <line x1="548" y1="446" x2="548" y2="462" stroke="#06b6d4" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
    <circle cx="590" cy="442" r="3" fill="#06b6d4" opacity="0.35"/>
    <line x1="590" y1="445" x2="590" y2="458" stroke="#06b6d4" stroke-width="0.8" stroke-linecap="round" opacity="0.25"/>
  </g>

  <!-- Group 4 (upper area, wandering) -->
  <g filter="url(#neon)" opacity="0.45">
    <circle cx="460" cy="120" r="4" fill="#a855f7" opacity="0.5"/>
    <line x1="460" y1="124" x2="460" y2="142" stroke="#a855f7" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <circle cx="475" cy="118" r="3.5" fill="#a855f7" opacity="0.4"/>
    <line x1="475" y1="122" x2="475" y2="138" stroke="#a855f7" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
    <circle cx="448" cy="123" r="3" fill="#a855f7" opacity="0.35"/>
    <line x1="448" y1="126" x2="448" y2="140" stroke="#a855f7" stroke-width="0.8" stroke-linecap="round" opacity="0.25"/>
  </g>

  <!-- Group 5 (far left, fading) -->
  <g opacity="0.35">
    <circle cx="85" cy="380" r="3.5" fill="#06b6d4" opacity="0.4"/>
    <line x1="85" y1="384" x2="85" y2="400" stroke="#06b6d4" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
    <circle cx="98" cy="378" r="3" fill="#06b6d4" opacity="0.3"/>
    <line x1="98" y1="381" x2="98" y2="395" stroke="#06b6d4" stroke-width="0.8" stroke-linecap="round" opacity="0.2"/>
    <circle cx="73" cy="383" r="2.5" fill="#06b6d4" opacity="0.25"/>
    <line x1="73" y1="386" x2="73" y2="398" stroke="#06b6d4" stroke-width="0.7" stroke-linecap="round" opacity="0.15"/>
  </g>

  <!-- Group 6 (far right, fading) -->
  <g opacity="0.35">
    <circle cx="1070" cy="360" r="3.5" fill="#a855f7" opacity="0.4"/>
    <line x1="1070" y1="364" x2="1070" y2="380" stroke="#a855f7" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
    <circle cx="1085" cy="358" r="3" fill="#a855f7" opacity="0.3"/>
    <line x1="1085" y1="361" x2="1085" y2="375" stroke="#a855f7" stroke-width="0.8" stroke-linecap="round" opacity="0.2"/>
  </g>

  <!-- Migration/movement paths (dotted arcs connecting groups) -->
  <g stroke="#06b6d4" fill="none" stroke-width="0.6" opacity="0.12" stroke-dasharray="2,5">
    <path d="M190,260 Q300,200 460,120"/>
    <path d="M190,260 Q350,380 560,440"/>
    <path d="M575,440 Q750,400 920,270"/>
    <path d="M460,125 Q600,100 750,155"/>
  </g>
  <g stroke="#a855f7" fill="none" stroke-width="0.5" opacity="0.1" stroke-dasharray="2,6">
    <path d="M85,380 Q200,350 350,310"/>
    <path d="M920,270 Q980,310 1070,360"/>
    <path d="M460,120 Q350,170 280,160"/>
  </g>

  <!-- Cultural symbols (abstract, minimal) -->
  <!-- Crescent (subtle) -->
  <g transform="translate(310, 400)" opacity="0.12">
    <path d="M0,-14 A14,14 0 1,1 0,14 A10,10 0 1,0 0,-14" fill="none" stroke="#06b6d4" stroke-width="1"/>
  </g>

  <!-- Cross shape (subtle) -->
  <g transform="translate(890, 170)" opacity="0.1">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#a855f7" stroke-width="1"/>
    <line x1="-7" y1="-2" x2="7" y2="-2" stroke="#a855f7" stroke-width="1"/>
  </g>

  <!-- Star (subtle) -->
  <g transform="translate(710, 430)" opacity="0.1">
    <polygon points="0,-10 2.4,-3 10,-3 3.8,1.8 6.2,9 0,4.5 -6.2,9 -3.8,1.8 -10,-3 -2.4,-3" fill="none" stroke="#06b6d4" stroke-width="0.8"/>
  </g>

  <!-- Dharma wheel (subtle) -->
  <g transform="translate(200, 160)" opacity="0.08">
    <circle r="9" fill="none" stroke="#a855f7" stroke-width="0.7"/>
    <circle r="3" fill="none" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="0" y1="-9" x2="0" y2="9" stroke="#a855f7" stroke-width="0.4"/>
    <line x1="-9" y1="0" x2="9" y2="0" stroke="#a855f7" stroke-width="0.4"/>
    <line x1="-6.4" y1="-6.4" x2="6.4" y2="6.4" stroke="#a855f7" stroke-width="0.4"/>
    <line x1="6.4" y1="-6.4" x2="-6.4" y2="6.4" stroke="#a855f7" stroke-width="0.4"/>
  </g>

  <!-- Yin-Yang outline (subtle) -->
  <g transform="translate(1020, 450)" opacity="0.08">
    <circle r="9" fill="none" stroke="#06b6d4" stroke-width="0.7"/>
    <path d="M0,-9 A4.5,4.5 0 0,1 0,0 A4.5,4.5 0 0,0 0,9 A9,9 0 0,1 0,-9" fill="none" stroke="#06b6d4" stroke-width="0.5"/>
  </g>

  <!-- Menorah outline (subtle) -->
  <g transform="translate(140, 470)" opacity="0.08">
    <path d="M-8,8 L-8,0 Q-8,-8 0,-12 Q8,-8 8,0 L8,8" fill="none" stroke="#a855f7" stroke-width="0.7"/>
    <path d="M-5,8 L-5,2 Q-5,-4 0,-7 Q5,-4 5,2 L5,8" fill="none" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="0" y1="8" x2="0" y2="-12" stroke="#a855f7" stroke-width="0.5"/>
  </g>

  <!-- Scattered question-mark-like shapes (identity uncertainty) -->
  <g stroke="#a855f7" fill="none" stroke-width="0.6" opacity="0.08">
    <path d="M505,480 Q510,470 505,465 Q498,462 505,455"/>
    <circle cx="505" cy="485" r="1" fill="#a855f7"/>
  </g>
  <g stroke="#06b6d4" fill="none" stroke-width="0.5" opacity="0.06">
    <path d="M835,430 Q840,420 835,415 Q828,412 835,405"/>
    <circle cx="835" cy="435" r="0.8" fill="#06b6d4"/>
  </g>

  <!-- Soft glowing nodes at key positions (like displaced centers) -->
  <g filter="url(#neon)">
    <!-- Node at center territory -->
    <circle cx="600" cy="280" r="3" fill="#a855f7" opacity="0.35"/>
    <circle cx="600" cy="280" r="8" fill="none" stroke="#a855f7" stroke-width="0.5" opacity="0.15" stroke-dasharray="2,3"/>
    <circle cx="600" cy="280" r="15" fill="none" stroke="#a855f7" stroke-width="0.3" opacity="0.08" stroke-dasharray="1,4"/>
    <!-- Node near upper territory -->
    <circle cx="330" cy="170" r="2.5" fill="#06b6d4" opacity="0.3"/>
    <circle cx="330" cy="170" r="7" fill="none" stroke="#06b6d4" stroke-width="0.5" opacity="0.12" stroke-dasharray="2,3"/>
    <!-- Node near right territory -->
    <circle cx="810" cy="180" r="2.5" fill="#a855f7" opacity="0.28"/>
    <circle cx="810" cy="180" r="7" fill="none" stroke="#a855f7" stroke-width="0.5" opacity="0.1" stroke-dasharray="2,3"/>
    <!-- Node at lower territory -->
    <circle cx="505" cy="370" r="2" fill="#06b6d4" opacity="0.25"/>
    <circle cx="505" cy="370" r="6" fill="none" stroke="#06b6d4" stroke-width="0.4" opacity="0.1" stroke-dasharray="2,3"/>
  </g>

  <!-- Scattered particles -->
  <g fill="#06b6d4" opacity="0.3">
    <circle cx="50" cy="90" r="1.5"/>
    <circle cx="120" cy="540" r="1"/>
    <circle cx="1130" cy="100" r="1.5"/>
    <circle cx="1080" cy="520" r="1"/>
    <circle cx="680" cy="50" r="1.2"/>
    <circle cx="350" cy="540" r="1"/>
    <circle cx="950" cy="530" r="1.3"/>
    <circle cx="30" cy="200" r="0.8"/>
    <circle cx="1170" cy="300" r="0.8"/>
  </g>
  <g fill="#a855f7" opacity="0.2">
    <circle cx="1100" cy="70" r="1"/>
    <circle cx="60" cy="450" r="1.5"/>
    <circle cx="980" cy="500" r="1"/>
    <circle cx="250" cy="60" r="1.2"/>
    <circle cx="780" cy="545" r="0.8"/>
    <circle cx="430" cy="30" r="1"/>
    <circle cx="1160" cy="450" r="0.9"/>
  </g>

  <!-- Very faint grid suggesting a map projection -->
  <g stroke="#06b6d4" stroke-width="0.2" opacity="0.04">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="800" y1="0" x2="800" y2="600"/>
    <line x1="1000" y1="0" x2="1000" y2="600"/>
  </g>

</svg>